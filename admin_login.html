<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --void:#0a0e14; --void-2:#0d131c; --panel:#111925; --line:#243248;
    --text:#e8eef5; --text-faint:#5b6b83; --amber:#ffb454; --cyan:#5eead4; --rose:#ff8fa3;
    --mono:'JetBrains Mono',ui-monospace,monospace; --sans:'Inter',sans-serif;
  }
  *{ box-sizing:border-box; }
  body{
    margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center;
    font-family:var(--sans); color:var(--text); padding:20px; background:var(--void);
  }
  .box{ width:100%; max-width:360px; background:var(--panel); border:1px solid var(--line); border-radius:20px; padding:28px 24px; }
  .eyebrow{ font-family:var(--mono); font-size:11px; letter-spacing:.16em; color:var(--amber); text-transform:uppercase; margin:0 0 8px; }
  h1{ font-family:var(--mono); font-size:20px; margin:0 0 20px; }
  input{
    width:100%; padding:13px 14px; border-radius:10px; border:1px solid var(--line);
    background:var(--void-2); color:var(--text); font-size:15px; margin-bottom:16px;
  }
  input:focus{ outline:none; border-color:var(--cyan); }
  button{
    width:100%; padding:14px; border-radius:10px; border:none; cursor:pointer;
    background:linear-gradient(135deg, var(--amber), #ff9d4d); color:#1a1200; font-weight:800; font-size:14px;
  }
  .error{ background:#2a1418; border:1px solid var(--rose); color:var(--rose); padding:10px 12px; border-radius:10px; font-size:13px; margin-bottom:16px; }
</style>
</head>
<body>
  <div class="box">
    <p class="eyebrow">Owner Access</p>
    <h1>Admin Login</h1>
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    <form method="POST">
      <input type="password" name="password" placeholder="Admin password" required autocomplete="current-password">
      <button type="submit">Enter</button>
    </form>
  </div>
</body>
</html>
