<meta charset="UTF-8">

    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background-color: #0f172a;
        color: #e2e8f0;
        margin: 0;
        padding: 20px;
    }
    .container { max-width: 700px; margin: 0 auto; }
    .box { background: #1e293b; border-radius: 16px; padding: 25px; }
    h1 { text-align: center; color: #38bdf8; font-size: 26px; margin-bottom: 2px; }
    .subtitle { text-align: center; color: #94a3b8; margin-bottom: 20px; font-size: 14px; }
    hr { border: none; border-top: 1px solid #334155; margin-bottom: 20px; }
    .search-box { display: flex; gap: 10px; margin-bottom: 20px; }
    input[type="text"] {
        flex: 1; padding: 14px; border-radius: 10px; border: none;
        background: #0f172a; color: white; font-size: 16px;
    }
    button.search-btn {
        background: #2563eb; border: none; color: white; padding: 0 20px;
        border-radius: 10px; cursor: pointer; font-size: 18px;
    }
    .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 10px; }
    .grid.two { grid-template-columns: repeat(2, 1fr); }
    .tile {
        background: #e2e8f0; color: #1e293b; border: none; padding: 14px 6px;
        border-radius: 10px; font-weight: bold; font-size: 14px; cursor: pointer; text-align: center;
    }
    .tile:hover { background: #cbd5e1; }
    #alphabetGrid { grid-template-columns: repeat(6, 1fr); }
    #listBox { margin-top: 15px; display: none; }
    #listBox.show { display: block; }
    .list-item {
        background: #0f172a; border: 1px solid #334155; padding: 10px 14px;
        border-radius: 8px; margin-bottom: 8px; cursor: pointer; font-size: 14px;
    }
    .list-item:hover { border-color: #38bdf8; }
    .list-item b { color: #38bdf8; }
    #result {
        margin-top: 20px; padding: 16px; background: #0f172a; border-left: 4px solid #38bdf8;
        border-radius: 8px; line-height: 1.7; display: none;
    }
    #result.show { display: block; }
    #result h3 { color: #38bdf8; margin: 0 0 8px 0; }
    .count { color: #94a3b8; font-size: 13px; margin: 10px 0; }
</style>

        <p class="subtitle">Aamir Khan Automated Diagnostic Bot</p>
        <hr>

        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Panic code ya keyword likhein..." onkeyup="if(event.key==='Enter')searchCode()">
            <button class="search-btn" onclick="searchCode()">🔍</button>
        </div>

        <div class="grid two">
            <button class="tile" onclick="showByCategory('SMC PANIC')">SMC PANIC - ASSERTION</button>
            <button class="tile" onclick="showByCategory('WATCHDOG')">USERSPACE WATCHDOG TIMEOUT</button>
        </div>
        <div class="grid two">
            <button class="tile" onclick="showByCategory('I2C')">I2C</button>
            <button class="tile" onclick="showByCategory('AOP')">AOP PANIC</button>
        </div>
        <div class="grid" id="alphabetGrid"></div>

        <div id="listBox"></div>
        <div id="result"></div>
    </div>
</div>

// Alphabet grid: sirf un letters ke button banao jinse koi text-code shuru hota hai
function buildAlphabetGrid() {
    const box = document.getElementById('alphabetGrid');
    box.innerHTML = "";
    const letters = [...new Set(
        panicData
            .filter(e => !/^0x/i.test(e.code.trim()))
            .map(e => e.code.trim()[0].toUpperCase())
    )].sort();
    letters.forEach(letter => {
        const btn = document.createElement('button');
        btn.className = 'tile';
        btn.textContent = letter;
        btn.onclick = () => showByLetter(letter);
        box.appendChild(btn);
    });
}
buildAlphabetGrid();

function hideDetail() {
    document.getElementById('result').classList.remove('show');
}

// Agar code pura ek hex number hai (jaise 0X41), uski decimal value nikaal do
function getDecimal(code) {
    const trimmed = code.trim();
    if (/^0x[0-9a-f]+$/i.test(trimmed)) {
        return parseInt(trimmed, 16);
    }
    return null;
}

function showList(items, emptyMsg) {
    hideDetail();
    const box = document.getElementById('listBox');
    box.classList.add('show');
    if (!items.length) {
        box.innerHTML = `<div class="count">${emptyMsg || 'Koi matching entry nahi mili.'}</div>`;
        return;
    }
    let html = `<div class="count">${items.length} result mile — kisi ek par click karein:</div>`;
    items.forEach((item, i) => {
        const dec = getDecimal(item.code);
        const decLabel = dec !== null ? ` <span style="color:#94a3b8">(Decimal: ${dec})</span>` : "";
        html += `<div class="list-item" onclick="showDetailByIndex(${panicData.indexOf(item)})"><b>${item.code}</b>${decLabel} — ${item.cause}</div>`;
    });
    box.innerHTML = html;
}

function showDetailByIndex(idx) {
    const entry = panicData[idx];
    document.getElementById('listBox').classList.remove('show');
    const box = document.getElementById('result');
    box.classList.add('show');
    const dec = getDecimal(entry.code);
    const decLine = dec !== null ? `<br><strong>Decimal Form:</strong> ${dec}` : "";
    box.innerHTML = `<h3>${entry.code}</h3>${decLine}<br><strong>Likely Cause / Faulty Part:</strong> ${entry.cause}<br><strong>Category:</strong> ${entry.category}`;
}

function searchCode() {
    const raw = document.getElementById('searchInput').value.trim();
    const val = raw.toUpperCase();
    if (!val) return alert("Pehle kuch likhein!");

    // Agar user ne pure decimal number type kiya hai, uska hex equivalent nikaal lo
    let hexFromDecimal = null;
    if (/^[0-9]+$/.test(raw)) {
        hexFromDecimal = "0X" + parseInt(raw, 10).toString(16).toUpperCase();
    }

    const found = panicData.filter(item => {
        const codeUpper = item.code.toUpperCase();
        const causeUpper = item.cause.toUpperCase();
        const dec = getDecimal(item.code);

        if (codeUpper.includes(val)) return true;
        if (causeUpper.includes(val)) return true;
        // decimal se search: typed number == is code ki decimal value
        if (dec !== null && String(dec).includes(raw)) return true;
        // agar typed value decimal hai aur uska hex is code se match karta hai
        if (hexFromDecimal && codeUpper === hexFromDecimal) return true;

        return false;
    });
    showList(found, "Is keyword/code (hex ya decimal) ke liye abhi data add nahi hua hai.");
}

function showByCategory(cat) {
    const found = panicData.filter(item => item.category === cat);
    showList(found);
}

function showByLetter(letter) {
    const found = panicData.filter(item => item.code.trim().toUpperCase().startsWith(letter));
    showList(found);
}
